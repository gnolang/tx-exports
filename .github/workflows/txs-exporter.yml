name: Backup testnets

on:
  # allow to run workflow manually
  workflow_dispatch: { }

  # Triggers the workflow every 4hrs
  schedule:
    - cron: "0 */4 * * *"

jobs:
  backup:
    name: "backup ${{ matrix.testnet }}"
    runs-on: ubuntu-latest
    timeout-minutes: 720 # very high; but it can take a while.

    permissions:
      contents: write

    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        testnet:
          - test11.gno.land
          - gnoland1

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: false

      - uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-1.25-txarchive-v0.5.1

      - name: Run backup script
        run: make -C ${{ matrix.testnet }} fetch

      - name: Run extractor
        run: make -C ${{ matrix.testnet }} extractor

      - name: Run stats script
        run: make -C ${{ matrix.testnet }} stats

      - name: Run git pull
        run: git pull --no-tags origin main

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update ${{ matrix.testnet }} backup"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
          commit_author: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
